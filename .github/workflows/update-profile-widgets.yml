name: Update profile widgets

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update-widgets:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create profile directory
        run: mkdir -p profile

      - name: Generate stats card
        uses: soulteary/github-readme-stats-action@v1.0.0
        with:
          card: stats
          options: "username=${{ github.repository_owner }}&show_icons=true&theme=transparent&hide_border=true&rank_icon=github"
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: soulteary/github-readme-stats-action@v1.0.0
        with:
          card: top-langs
          options: "username=${{ github.repository_owner }}&layout=compact&theme=transparent&hide_border=true&langs_count=6"
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate streak card
        uses: muhammad-fiaz/github-readme-streak-stats@v1.0.1
        with:
          USERNAME: ${{ github.repository_owner }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          THEME: transparent
          OUTPUT_PATH: profile/streak.svg
          HIDE_BORDER: "true"

      - name: Generate trophy card
        uses: ryo-ma/github-profile-trophy@master
        with:
          username: ${{ github.repository_owner }}
          output_path: profile/trophy.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          theme: flat

      - name: Fetch activity graph with cache-busting
        shell: bash
        run: |
          URL="https://github-readme-activity-graph.vercel.app/graph?username=${{ github.repository_owner }}&theme=github-compact&hide_border=true&area=true&custom_title=${{ github.repository_owner }}%27s%20Contribution%20Graph&v=2"
          curl -L --fail "$URL" -o profile/activity-graph.tmp.svg
          if grep -qi "<svg" profile/activity-graph.tmp.svg; then
            mv profile/activity-graph.tmp.svg profile/activity-graph.svg
          else
            echo "Downloaded file is not a valid SVG."
            rm -f profile/activity-graph.tmp.svg
            exit 1
          fi

      - name: Commit updated widgets
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update profile widgets" || exit 0
          git push
